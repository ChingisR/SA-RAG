x-logging: &default-logging
  driver: "json-file"
  options:
    max-size: "10m"
    max-file: "3"

services:
  opensearch:
    image: opensearchproject/opensearch:3.5.0
    container_name: opensearch
    restart: unless-stopped
    logging: *default-logging
    environment:
      - discovery.type=single-node
      - bootstrap.memory_lock=true
      - "OPENSEARCH_JAVA_OPTS=-Xms4g -Xmx4g"
      - OPENSEARCH_INITIAL_ADMIN_PASSWORD=${OPENSEARCH_PASSWORD}
      # Required by the snapshot API to allow filesystem snapshots
      - "path.repo=/usr/share/opensearch/snapshots"
    ports: [ "9200:9200" ]
    volumes:
      - "opensearch_data:/usr/share/opensearch/data"
    healthcheck:
      test: [ "CMD-SHELL", "curl -k -f -u admin:$${OPENSEARCH_INITIAL_ADMIN_PASSWORD} https://localhost:9200/_cluster/health || exit 1" ]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
    stop_grace_period: 1m
    networks: [ rag-network ]

  opensearch-dashboards:
    image: opensearchproject/opensearch-dashboards:3.5.0
    container_name: opensearch-dashboards
    restart: unless-stopped
    logging: *default-logging
    ports: [ "5601:5601" ]
    environment:
      - 'OPENSEARCH_HOSTS=["https://opensearch:9200"]'
      - "OPENSEARCH_USERNAME=${OPENSEARCH_USER:-admin}"
      - "OPENSEARCH_PASSWORD=${OPENSEARCH_PASSWORD}"
    networks: [ rag-network ]
    depends_on:
      opensearch: { condition: service_healthy }
  postgres:
    image: pgvector/pgvector:0.8.1-pg18-trixie
    container_name: postgres
    restart: unless-stopped
    logging: *default-logging
    ports: [ "5433:5432" ]
    environment:
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=${POSTGRES_DB}
      - PGDATA=/var/lib/postgresql/data/pgdata
    volumes: [ "postgres_data:/var/lib/postgresql/data" ]
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}" ]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s
    stop_grace_period: 1m
    networks: [ rag-network ]

  neo4j:
    image: neo4j:5.20.0
    container_name: neo4j
    restart: unless-stopped
    logging: *default-logging
    environment:
      - NEO4J_AUTH=${NEO4J_USER}/${NEO4J_PASSWORD}
      - NEO4J_PLUGINS=["apoc"]
      - NEO4J_dbms_security_procedures_unrestricted=apoc.*
      - NEO4J_dbms_security_procedures_allowlist=apoc.*
    ports:
      - "7474:7474"
      - "7687:7687"
    volumes: [ "neo4j_data:/data" ]
    healthcheck:
      test: [ "CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:7474/ || exit 1" ]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    stop_grace_period: 1m
    networks: [ rag-network ]

  valkey:
    image: valkey/valkey:8.0
    container_name: valkey
    restart: unless-stopped
    logging: *default-logging
    ports: [ "6379:6379" ]
    healthcheck:
      test: [ "CMD-SHELL", "valkey-cli ping | grep PONG || exit 1" ]
      interval: 10s
      timeout: 5s
      retries: 3
    networks: [ rag-network ]

  phoenix:
    image: arizephoenix/phoenix:latest
    container_name: phoenix
    restart: unless-stopped
    logging: *default-logging
    ports:
      - "6006:6006"
      - "4317:4317"
      - "4318:4318"
    healthcheck:
      test: [ "CMD", "python3", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:6006')" ]
      interval: 30s
      timeout: 10s
      retries: 3
    networks: [ rag-network ]

  # ── Embedding Server ────────────────────────────────────────────────────────
  # DISABLED: embed-server replaced by native custom_api.py on host:8082
  # embed-server:
  #   image: michaelf34/infinity:latest
  #   container_name: embed-server
  #   restart: unless-stopped
  #   logging: *default-logging
  #   command:
  #     - "v2"
  #     - "--model-id"
  #     - "BAAI/bge-m3"
  #     - "--port"
  #     - "8082"
  #     - "--device"
  #     - "cpu"
  #   ports:
  #     - "8082:8082"
  #   environment:
  #     - HF_HOME=/root/.cache/huggingface
  #     - NVIDIA_DISABLE_REQUIRE=true
  #   volumes:
  #     - hf_model_cache:/root/.cache/huggingface
  #   healthcheck:
  #     test: [ "CMD-SHELL", "curl -sf http://localhost:8082/health || exit 1" ]
  #     interval: 30s
  #     timeout: 10s
  #     retries: 10
  #     start_period: 300s
  #   networks: [ rag-network ]

  # ── Reranker Server ──────────────────────────────────────────────────────────
  # DISABLED: rerank-server replaced by native custom_api.py on host:8082
  # rerank-server:
  #   image: michaelf34/infinity:latest
  #   container_name: rerank-server
  #   restart: unless-stopped
  #   logging: *default-logging
  #   command:
  #     - "v2"
  #     - "--model-id"
  #     - "BAAI/bge-reranker-v2-m3"
  #     - "--port"
  #     - "8083"
  #     - "--device"
  #     - "cpu"
  #   ports:
  #     - "8083:8083"
  #   environment:
  #     - HF_HOME=/root/.cache/huggingface
  #     - NVIDIA_DISABLE_REQUIRE=true
  #   volumes:
  #     - hf_model_cache:/root/.cache/huggingface
  #   healthcheck:
  #     test: [ "CMD-SHELL", "curl -sf http://localhost:8083/health || exit 1" ]
  #     interval: 30s
  #     timeout: 10s
  #     retries: 10
  #     start_period: 300s
  #   networks: [ rag-network ]

  fastapi-app:
    build: { context: ./fastapi_app, dockerfile: Dockerfile }
    image: sa-rag-backend:latest
    container_name: fastapi-app
    restart: unless-stopped
    logging: *default-logging
    environment:
      - GPU_NODE_IP=${GPU_NODE_IP:-172.19.0.1}
      - VLLM_BASE_URL=http://${GPU_NODE_IP:-172.19.0.1}:8081/v1
      - INFINITY_EMBED_URL=http://${GPU_NODE_IP:-172.19.0.1}:8082/v1
      - RERANK_URL=http://${GPU_NODE_IP:-172.19.0.1}:8082/v1
      - OPENSEARCH_URL=https://opensearch:9200
      - POSTGRES_URL=postgresql://${POSTGRES_USER:-admin}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-universal_rag_db}
      - NEO4J_URI=bolt://neo4j:7687
      - NEO4J_USER=${NEO4J_USER:-neo4j}
      - NEO4J_PASSWORD=${NEO4J_PASSWORD}
      - OPENSEARCH_USER=${OPENSEARCH_USER:-admin}
      - OPENSEARCH_PASSWORD=${OPENSEARCH_PASSWORD}
      - PHOENIX_COLLECTOR_ENDPOINT=http://phoenix:6006/v1/traces
      - VALKEY_URL=redis://valkey:6379/0
      - MAIN_MODEL=${MAIN_MODEL:-Qwen/Qwen3.5-27B-FP8}
      - EMBED_MODEL=${EMBED_MODEL:-Qwen/Qwen3-VL-Embedding-8B}
      - RERANK_MODEL=${RERANK_MODEL:-Qwen/Qwen3-VL-Reranker-8B}
      - EMBED_DIM=${EMBED_DIM:-4096}
      - JWT_SECRET=${JWT_SECRET}
      - CORS_ORIGINS=${CORS_ORIGINS:-}
      - ADMIN_EMAIL=${ADMIN_EMAIL:-admin@enterprise.com}
      - ADMIN_DEFAULT_PASSWORD=${ADMIN_DEFAULT_PASSWORD}
      - MAX_UPLOAD_MB=${MAX_UPLOAD_MB:-50}
    volumes:
      - ./fastapi_app:/app
      - uploaded_data:/app/data
    extra_hosts:
      - "host.docker.internal:host-gateway"
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:8000/health/live" ]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 120s
    depends_on:
      postgres: { condition: service_healthy }
      opensearch: { condition: service_healthy }
      neo4j: { condition: service_healthy }
      valkey: { condition: service_healthy }
      phoenix: { condition: service_started }
      # embed-server and rerank-server removed — now served natively via custom_api.py on host:8082
    networks:
      rag-network:

  celery-worker:
    image: sa-rag-backend:latest
    container_name: celery-worker
    restart: unless-stopped
    logging: *default-logging
    deploy:
      resources:
        limits:
          memory: 16g
    command: [ "celery", "-A", "worker.celery_app", "worker", "--loglevel=info", "--concurrency=${CELERY_CONCURRENCY:-4}" ]
    environment:
      - GPU_NODE_IP=${GPU_NODE_IP:-172.19.0.1}
      - VLLM_BASE_URL=http://${GPU_NODE_IP:-172.19.0.1}:8081/v1
      - INFINITY_EMBED_URL=http://${GPU_NODE_IP:-172.19.0.1}:8082/v1
      - RERANK_URL=http://${GPU_NODE_IP:-172.19.0.1}:8082/v1
      - OPENSEARCH_URL=https://opensearch:9200
      - NEO4J_URI=bolt://neo4j:7687
      - NEO4J_USER=${NEO4J_USER:-neo4j}
      - NEO4J_PASSWORD=${NEO4J_PASSWORD}
      - OPENSEARCH_USER=${OPENSEARCH_USER:-admin}
      - OPENSEARCH_PASSWORD=${OPENSEARCH_PASSWORD}
      - VALKEY_URL=redis://valkey:6379/0
      - MAIN_MODEL=${MAIN_MODEL:-Qwen/Qwen3.5-27B-FP8}
      - EMBED_MODEL=${EMBED_MODEL:-Qwen/Qwen3-VL-Embedding-8B}
      - RERANK_MODEL=${RERANK_MODEL:-Qwen/Qwen3-VL-Reranker-8B}
      - PHOENIX_COLLECTOR_ENDPOINT=http://phoenix:6006/v1/traces
      - EMBED_DIM=${EMBED_DIM:-4096}
      - POSTGRES_URL=postgresql://${POSTGRES_USER:-admin}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-universal_rag_db}
    ulimits:
      nofile:
        soft: 65536
        hard: 65536
    volumes:
      - ./fastapi_app:/app
      - uploaded_data:/app/data
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      fastapi-app: { condition: service_started }
      valkey: { condition: service_healthy }
      postgres: { condition: service_healthy }
      opensearch: { condition: service_healthy }
      neo4j: { condition: service_healthy }
    healthcheck:
      test: [ "CMD-SHELL", "celery -A worker.celery_app inspect ping -d celery@$$HOSTNAME || exit 1" ]
      interval: 30s
      timeout: 10s
      retries: 3
    stop_grace_period: 30s
    networks: [ rag-network ]

  ingestion-agent:
    build: { context: ./ingestion_agent, dockerfile: Dockerfile }
    container_name: ingestion-agent
    restart: unless-stopped
    logging: *default-logging
    deploy:
      resources:
        limits:
          memory: 16g
    env_file:
      - ./ingestion_agent/.env
    volumes:
      - ./ingestion_agent:/app
      - smb_data:/app/smb_copy:ro
    depends_on:
      fastapi-app: { condition: service_healthy }
    healthcheck:
      test: [ "CMD-SHELL", "find /app/heartbeat.txt -mmin -10 | grep -q . || exit 1" ]
      interval: 60s
      timeout: 10s
      retries: 3
    networks: [ rag-network ]

  legal-hr-frontend:
    build: { context: ./legal_hr_frontend, dockerfile: Dockerfile }
    container_name: legal-hr-frontend
    restart: unless-stopped
    logging: *default-logging
    healthcheck:
      test: [ "CMD-SHELL", "wget -qO- http://127.0.0.1:80/ || exit 1" ]
      interval: 30s
      timeout: 10s
      retries: 3
    networks: [ rag-network ]

  nginx:
    image: nginx:alpine
    container_name: nginx
    restart: unless-stopped
    logging: *default-logging
    ports:
      - "80:80"
      - "8443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - nginx_certs:/etc/nginx/certs
    command: |
      sh -c '
        if [ ! -f /etc/nginx/certs/server.crt ]; then
          echo ">>> Generating self-signed TLS certificate..." &&
          apk add --no-cache openssl &&
          mkdir -p /etc/nginx/certs &&
          openssl req -x509 -nodes -days 3650 -newkey rsa:4096 -keyout /etc/nginx/certs/server.key -out /etc/nginx/certs/server.crt -subj "/C=KZ/ST=Almaty/L=Almaty/O=Enterprise/OU=IT/CN=95.56.244.198" &&
          echo ">>> Certificate generated."
        fi &&
        nginx -g "daemon off;"
      '
    healthcheck:
      test: [ "CMD-SHELL", "wget --no-check-certificate --no-verbose --tries=1 --spider http://127.0.0.1:80/ || exit 1" ]
      interval: 30s
      timeout: 10s
      retries: 3
    depends_on:
      legal-hr-frontend: { condition: service_healthy }
      fastapi-app: { condition: service_started }
    networks:
      rag-network:

  prometheus:
    image: prom/prometheus:v2.53.0
    container_name: prometheus
    restart: unless-stopped
    logging: *default-logging
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--storage.tsdb.retention.time=30d"
      - "--web.console.libraries=/usr/share/prometheus/console_libraries"
      - "--web.console.templates=/usr/share/prometheus/consoles"
    depends_on:
      fastapi-app: { condition: service_started }
    networks: [ rag-network ]

  grafana:
    image: grafana/grafana:11.1.0
    container_name: grafana
    restart: unless-stopped
    logging: *default-logging
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_USER=${GRAFANA_USER:-admin}
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_PASSWORD:-changeme}
      - GF_USERS_ALLOW_SIGN_UP=false
      - GF_SERVER_ROOT_URL=http://localhost:3000
    volumes:
      - grafana_data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
    depends_on:
      - prometheus
    networks: [ rag-network ]

networks:
  rag-network: { driver: bridge }

volumes:
  opensearch_data:
    driver: local
    driver_opts:
      o: bind
      type: none
      device: /mnt/sda1/chingis/opensearch_data
  postgres_data:
    driver: local
    driver_opts:
      o: bind
      type: none
      device: /mnt/sda1/chingis/postgres_data
  neo4j_data:
    driver: local
    driver_opts:
      o: bind
      type: none
      device: /mnt/sda1/chingis/neo4j_data
  uploaded_data:
    driver: local
    driver_opts:
      o: bind
      type: none
      device: /mnt/sda1/chingis/uploaded_data
  hf_model_cache:
    driver: local
    driver_opts:
      o: bind
      type: none
      device: /home/chingiz/.cache/huggingface
  nginx_certs:
  prometheus_data:
  grafana_data:
  smb_data:
    driver: local
    driver_opts:
      o: bind
      type: none
      device: /mnt/sda1/chingis/AgenticRAG/smb_copy
