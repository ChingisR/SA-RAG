server {
    listen 80;
    server_name localhost;

    root /usr/share/nginx/html;
    index index.html;

    # Handle React Router client-side routing
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Proxy /api requests to the backend container (host mapping in nginx root)
    # Note: In our setup, the root Nginx handles the proxying to fastapi-app,
    # but having this as a fallback in the frontend bin is good practice.
    location /api/ {
        resolver 127.0.0.11 valid=30s;
        set $upstream fastapi-app;
        proxy_pass http://$upstream:8000/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
    }

    error_page 500 502 503 504 /50x.html;
    location = /50x.html {
        root /usr/share/nginx/html;
    }
}
